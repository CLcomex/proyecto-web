<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopta - Mi Club Perruno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-orange-600 flex items-center gap-2">
                <i class="fas fa-paw"></i> <a href="index.html">MiClubPerruno</a>
            </div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="index.html" class="hover:text-orange-600 transition">Inicio</a>
                <a href="adopta.html" class="text-orange-600 font-bold underline">Adopta</a>
            </div>
        </div>
    </nav>

    <section class="py-12 bg-orange-100 text-center">
        <h1 class="text-4xl font-bold text-orange-800">Candidatos a un Hogar</h1>
        <p class="text-orange-600 mt-2">Conoce a nuestros peludos que buscan una familia</p>
    </section>

    <section class="container mx-auto px-6 py-12">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:scale-105 transition">
                <img src="https://images.pexels.com/photos/1108099/pexels-photo-1108099.jpeg?auto=compress&cs=tinysrgb&w=400" class="w-full h-64 object-cover" alt="Perrito 1">
                <div class="p-6">
                    <h3 class="text-xl font-bold">Max</h3>
                    <p class="text-gray-600 italic">2 años - Juguetón</p>
                    <button class="mt-4 w-full bg-orange-600 text-white py-2 rounded-lg font-bold hover:bg-orange-700">Conóceme</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:scale-105 transition">
                <img src="https://images.pexels.com/photos/1612846/pexels-photo-1612846.jpeg?auto=compress&cs=tinysrgb&w=400" class="w-full h-64 object-cover" alt="Perrito 2">
                <div class="p-6">
                    <h3 class="text-xl font-bold">Luna</h3>
                    <p class="text-gray-600 italic">1 año - Cariñosa</p>
                    <button class="mt-4 w-full bg-orange-600 text-white py-2 rounded-lg font-bold hover:bg-orange-700">Conóceme</button>
                </div>
            </div>
        </div>
    </section>

    <div class="text-center py-8">
        <a href="index.html" class="text-orange-600 font-bold hover:underline">← Volver al Inicio</a>
    </div>

</body>
</html>
